name: Debug push notifications

on:
  workflow_dispatch:
    inputs:
      send_test:
        description: "Envoyer un vrai push de test aux tokens stockés (1 = oui)"
        required: false
        default: "0"

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - run: node scripts/debug-push.js
        env:
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
          SEND_TEST: ${{ github.event.inputs.send_test }}
