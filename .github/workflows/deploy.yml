name: Deploy to Firebase  # CI/CD test

on:
  push:
    branches:
      - main

# Back-to-back merges used to race each other on the Cloud Functions
# deploy (ABORTED "unable to queue the operation") — run one deploy at a
# time, and skip intermediate queued ones since each run deploys full main.
concurrency:
  group: firebase-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Deploy hosting
        env:
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
        run: node scripts/deploy.js

      - name: Install functions dependencies
        run: npm ci
        working-directory: functions

      - name: Deploy Cloud Functions
        env:
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
        run: node scripts/deploy-functions.js
