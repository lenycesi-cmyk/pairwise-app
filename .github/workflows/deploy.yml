name: Deploy to Firebase  # CI/CD test

on:
  push:
    branches:
      - main
  # Permet de relancer un déploiement à la main depuis l'onglet Actions
  # (ex. après l'ajout d'un secret, sans merge à faire).
  workflow_dispatch:

# Back-to-back merges used to race each other on the Cloud Functions
# deploy (ABORTED "unable to queue the operation") — run one deploy at a
# time, and skip intermediate queued ones since each run deploys full main.
concurrency:
  group: firebase-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Historique complet pour pouvoir diff le commit précédent et savoir
          # si le dossier functions/ a changé (voir "Detect functions changes").
          fetch-depth: 0

      - name: Detect functions changes
        id: functions_changed
        run: |
          # On ne redéploie les Cloud Functions (~8 min) que si functions/ a
          # bougé. Un déclenchement manuel (workflow_dispatch) force le déploiement.
          before="${{ github.event.before }}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          elif [ -z "$before" ] || [ "$before" = "0000000000000000000000000000000000000000" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          elif git diff --name-only "$before" "${{ github.sha }}" | grep -qE '^functions/'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Detect firestore rules changes
        id: rules_changed
        run: |
          # On ne redéploie les règles Firestore que si firestore.rules a bougé
          # (évite d'accumuler des rulesets inutiles). workflow_dispatch force.
          before="${{ github.event.before }}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          elif [ -z "$before" ] || [ "$before" = "0000000000000000000000000000000000000000" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          elif git diff --name-only "$before" "${{ github.sha }}" | grep -qE '^firestore\.rules$'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        env:
          # Clé GIPHY pour le picker GIF des commentaires. Vite fige les
          # variables VITE_* dans le bundle au build : si le secret est
          # absent, le bouton GIF est simplement masqué dans l'app.
          VITE_GIPHY_API_KEY: ${{ secrets.GIPHY_API_KEY }}
          # Clé VAPID Web Push (console Firebase → Cloud Messaging → Web Push
          # certificates). Sans elle, la section push des Réglages est masquée.
          VITE_FIREBASE_VAPID_KEY: ${{ secrets.FIREBASE_VAPID_KEY }}
        run: npm run build

      - name: Deploy hosting
        env:
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
        run: node scripts/deploy.js

      - name: Deploy Firestore rules
        if: steps.rules_changed.outputs.changed == 'true'
        env:
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
        run: node scripts/deploy-rules.js

      - name: Install functions dependencies
        if: steps.functions_changed.outputs.changed == 'true'
        run: npm ci
        working-directory: functions

      - name: Deploy Cloud Functions
        if: steps.functions_changed.outputs.changed == 'true'
        env:
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
        run: node scripts/deploy-functions.js
